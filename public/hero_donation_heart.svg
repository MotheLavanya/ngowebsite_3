<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="heartBGGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5eb" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Glowing Pink-Orange Ribbon 1 -->
    <linearGradient id="ribbon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#ff5252"/>
    </linearGradient>

    <!-- Glowing Red-Orange Ribbon 2 -->
    <linearGradient id="ribbon2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#ee5253"/>
    </linearGradient>

    <!-- Deep Drop Shadow -->
    <filter id="ribbonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#ff5252" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background Soft Warm Glow -->
  <circle cx="200" cy="200" r="160" fill="url(#heartBGGlow)"/>

  <!-- Decorative Sparkles -->
  <g opacity="0.7">
    <path d="M200,60 L202,68 L210,70 L202,72 L200,80 L198,72 L190,70 L198,68 Z" fill="#ff9f43"/>
    <path d="M90,140 L91,145 L96,146 L91,147 L90,152 L89,147 L84,146 L89,145 Z" fill="#ff5252"/>
    <path d="M310,220 L311,225 L316,226 L311,227 L310,232 L309,227 L304,226 L309,225 Z" fill="#ff9f43"/>
    <circle cx="280" cy="110" r="4" fill="#ffd699"/>
    <circle cx="120" cy="260" r="3" fill="#ff5252" opacity="0.5"/>
  </g>

  <!-- Elegant Intersecting Hearts Ribbons -->
  <g filter="url(#ribbonShadow)" transform="translate(0, 10)">
    <!-- Right Ribbon -->
    <path d="M200,320 C200,320 290,240 290,160 C290,100 240,70 200,120 C180,95 160,80 140,80 C100,80 80,110 80,150 C80,210 140,270 200,320 Z" fill="url(#ribbon1)" opacity="0.95"/>
    
    <!-- Left Intersecting Highlight Ribbon -->
    <path d="M200,320 C160,280 110,230 110,160 C110,100 160,70 200,120 C200,120 180,90 150,90 C110,90 90,120 90,160 C90,220 150,270 200,320 Z" fill="url(#ribbon2)"/>

    <!-- Inner Golden Glow Core -->
    <circle cx="200" cy="160" r="25" fill="#ffffff" opacity="0.15" filter="blur(8px)"/>
    <path d="M200,175 C200,175 180,155 180,140 C180,128 190,118 200,130 C210,118 220,128 220,140 C220,155 200,175 200,175 Z" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
