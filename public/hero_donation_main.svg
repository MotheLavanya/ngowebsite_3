<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Background Glow Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2df" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm Orange Heart Gradient -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="50%" stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#dd4400"/>
    </linearGradient>

    <!-- Fresh Green Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Soft Hands Gradient -->
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>

    <!-- Drop Shadow for Premium Depth -->
    <filter id="premiumShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#ff8c00" flood-opacity="0.15"/>
    </filter>
    <filter id="handShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background Soft Glow Orb -->
  <circle cx="400" cy="300" r="300" fill="url(#bgGlow)"/>

  <!-- Glowing Sparkles & Particle Dots (Wow Factor) -->
  <g opacity="0.8">
    <!-- Star 1 -->
    <path d="M400,100 L404,115 L419,119 L404,123 L400,138 L396,123 L381,119 L396,115 Z" fill="#ff8c00" opacity="0.6"/>
    <!-- Star 2 -->
    <path d="M220,180 L222,188 L230,190 L222,192 L220,200 L218,192 L210,190 L218,188 Z" fill="#ffd699"/>
    <!-- Star 3 -->
    <path d="M580,220 L582,228 L590,230 L582,232 L580,240 L578,232 L570,230 L578,188 Z" fill="#ffaa00" opacity="0.8"/>
    <!-- Floating Light Orbs -->
    <circle cx="280" cy="140" r="6" fill="#ffd699" opacity="0.5"/>
    <circle cx="520" cy="160" r="8" fill="#ff8c00" opacity="0.4"/>
    <circle cx="480" cy="100" r="4" fill="#ffd699" opacity="0.6"/>
    <circle cx="320" cy="220" r="5" fill="#ff8c00" opacity="0.3"/>
  </g>

  <!-- Main Illustration Group -->
  <g transform="translate(0, 10)">
    <!-- THE HEART (Cradled in Center) -->
    <g filter="url(#premiumShadow)">
      <path d="M400,320 C400,320 330,260 330,210 C330,170 360,140 400,180 C440,140 470,170 470,210 C470,260 400,320 400,320 Z" fill="url(#heartGrad)"/>
    </g>

    <!-- THE SAPLING (Growing from Heart) -->
    <g>
      <!-- Stem -->
      <path d="M400,200 Q395,160 400,120" stroke="#10b981" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- Left Leaf -->
      <path d="M400,160 C370,150 360,120 400,120 Z" fill="url(#leafGrad)"/>
      <!-- Right Leaf -->
      <path d="M400,140 C430,135 440,110 400,110 Z" fill="url(#leafGrad)"/>
      <!-- Top Bud Leaf -->
      <path d="M400,120 C390,100 410,100 400,85 C390,100 410,100 400,120 Z" fill="#34d399"/>
    </g>

    <!-- CRADLING HANDS (Abstract, Minimalist, Elegant) -->
    <g filter="url(#handShadow)">
      <!-- Left Hand -->
      <path d="M220,420 C250,380 300,350 360,350 C375,350 380,360 370,370 C350,390 310,410 270,440 C250,455 230,440 220,420 Z" fill="url(#handGrad)"/>
      <!-- Right Hand -->
      <path d="M580,420 C550,380 500,350 440,350 C425,350 420,360 430,370 C450,390 490,410 530,440 C550,455 570,440 580,420 Z" fill="url(#handGrad)"/>
    </g>

    <!-- Light Glow on the Hands -->
    <ellipse cx="400" cy="355" rx="50" ry="12" fill="#ffd699" opacity="0.3"/>
  </g>
</svg>
